name: Backend tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fichafacil/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: fichafacil/backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests
        env:
          SECRET_KEY: 0123456789abcdef0123456789abcdef
          DEBUG: 'false'
          DATABASE_URL: sqlite+aiosqlite:///./data/test-fichafacil.db
        run: python -m unittest discover -s tests -v
