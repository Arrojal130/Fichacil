name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fichafacil/backend
    env:
      SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      DEBUG: 'false'
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: fichafacil/backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fichafacil
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check frontend JavaScript syntax
        run: |
          node --check frontend/js/api.js
          node --check frontend/js/utils.js
          node --check frontend/sw.js
