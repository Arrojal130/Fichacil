# Netlify Configuration for FichaFácil Frontend

[build]
  publish = "."
  
[[redirects]]
  from = "/api/*"
  to = "https://fichafacil-api.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/debug.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tests.html"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
