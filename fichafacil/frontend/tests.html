<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FichaFácil - Tests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pass { background-color: #d1fae5; }
        .fail { background-color: #fee2e2; }
        .pending { background-color: #fef3c7; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">🧪 FichaFácil - Tests de Componentes</h1>
        
        <div id="results" class="space-y-2"></div>
        
        <div class="mt-8 space-y-4">
            <button id="btn-run-all" class="bg-blue-600 text-white px-4 py-2 rounded">
                ▶️ Ejecutar Todos
            </button>
            <button id="btn-test-api" class="bg-gray-600 text-white px-4 py-2 rounded">
                🔌 Test API Connection
            </button>
            <button id="btn-test-register" class="bg-green-600 text-white px-4 py-2 rounded">
                📝 Test Register Flow
            </button>
        </div>
        
        <div id="api-response" class="mt-8 bg-white p-4 rounded shadow hidden">
            <h3 class="font-bold mb-2">API Response:</h3>
            <pre id="api-output" class="text-xs bg-gray-100 p-2 rounded overflow-auto max-h-64"></pre>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        
        function log(name, status, message = '') {
            const div = document.createElement('div');
            div.className = `p-3 rounded ${status}`;
            div.innerHTML = `<strong>${name}</strong>: ${message}`;
            resultsDiv.appendChild(div);
            console.log(`[${status.toUpperCase()}] ${name}: ${message}`);
        }
        
        function clearResults() {
            resultsDiv.innerHTML = '';
        }
        
        // ========== TESTS ==========
        
        async function testUtilsLoaded() {
            if (window.FichaFacilUtils) {
                log('Utils.js', 'pass', 'FichaFacilUtils está definido');
                return true;
            } else {
                log('Utils.js', 'fail', 'FichaFacilUtils NO está definido');
                return false;
            }
        }
        
        async function testApiLoaded() {
            if (window.FichaFacilAPI) {
                log('Api.js', 'pass', 'FichaFacilAPI está definido');
                return true;
            } else {
                log('Api.js', 'fail', 'FichaFacilAPI NO está definido');
                return false;
            }
        }
        
        async function testApiMethods() {
            const api = window.FichaFacilAPI;
            if (!api) {
                log('API Methods', 'fail', 'API no cargada');
                return false;
            }
            
            const methods = ['auth', 'negocios', 'fichajes', 'correcciones', 'pdf'];
            let allOk = true;
            
            for (const m of methods) {
                if (api[m]) {
                    log(`API.${m}`, 'pass', 'Existe');
                } else {
                    log(`API.${m}`, 'fail', 'NO existe');
                    allOk = false;
                }
            }
            return allOk;
        }
        
        async function testAuthMethods() {
            const auth = window.FichaFacilAPI?.auth;
            if (!auth) {
                log('Auth Methods', 'fail', 'auth no existe');
                return false;
            }
            
            const methods = ['register', 'loginAdmin', 'loginEmpleado', 'logout', 'isLoggedIn', 'me'];
            let allOk = true;
            
            for (const m of methods) {
                if (typeof auth[m] === 'function') {
                    log(`auth.${m}()`, 'pass', 'Existe');
                } else {
                    log(`auth.${m}()`, 'fail', 'NO existe o no es función');
                    allOk = false;
                }
            }
            return allOk;
        }
        
        async function testBackendConnection() {
            try {
                const response = await fetch('http://127.0.0.1:8000/health');
                if (response.ok) {
                    const data = await response.json();
                    log('Backend /health', 'pass', JSON.stringify(data));
                    return true;
                } else {
                    log('Backend /health', 'fail', `Status: ${response.status}`);
                    return false;
                }
            } catch (error) {
                log('Backend /health', 'fail', `Error: ${error.message}`);
                return false;
            }
        }
        
        async function testNegociosSearch() {
            try {
                const response = await fetch('http://127.0.0.1:8000/negocios/search?q=');
                if (response.ok) {
                    const data = await response.json();
                    log('GET /negocios/search', 'pass', `Encontrados: ${data.length} negocios`);
                    return true;
                } else {
                    log('GET /negocios/search', 'fail', `Status: ${response.status}`);
                    return false;
                }
            } catch (error) {
                log('GET /negocios/search', 'fail', `Error: ${error.message}`);
                return false;
            }
        }
        
        async function testRegisterEndpoint() {
            const testData = {
                negocio_nombre: "Test Bar " + Date.now(),
                negocio_slug: "test-bar-" + Date.now(),
                admin_nombre: "Admin Test",
                admin_email: "test" + Date.now() + "@test.com",
                admin_password: "test123"
            };
            
            try {
                const response = await fetch('http://127.0.0.1:8000/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                document.getElementById('api-response').classList.remove('hidden');
                document.getElementById('api-output').textContent = JSON.stringify(data, null, 2);
                
                if (response.status === 201) {
                    log('POST /auth/register', 'pass', `Negocio creado, token: ${data.access_token?.substring(0, 20)}...`);
                    return true;
                } else {
                    log('POST /auth/register', 'fail', `Status: ${response.status}, Error: ${data.detail || JSON.stringify(data)}`);
                    return false;
                }
            } catch (error) {
                log('POST /auth/register', 'fail', `Error: ${error.message}`);
                return false;
            }
        }
        
        // ========== UI TESTS ==========
        
        function testDashboardButtons() {
            // Simular cargar dashboard.html y verificar botones
            log('UI Tests', 'pending', 'Abre /dashboard.html y verifica manualmente');
        }
        
        // ========== RUNNERS ==========
        
        async function runAllTests() {
            clearResults();
            log('🚀 Tests', 'pending', 'Iniciando...');
            
            await testUtilsLoaded();
            await testApiLoaded();
            await testApiMethods();
            await testAuthMethods();
            await testBackendConnection();
            await testNegociosSearch();
            
            log('✅ Tests', 'pending', 'Completados');
        }
        
        // Event Listeners
        document.getElementById('btn-run-all').addEventListener('click', runAllTests);
        document.getElementById('btn-test-api').addEventListener('click', testBackendConnection);
        document.getElementById('btn-test-register').addEventListener('click', testRegisterEndpoint);
        
        // Auto-run on load
        runAllTests();
    </script>
</body>
</html>
