<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - FichaFácil</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #0f0; }
        .ok { color: #0f0; }
        .error { color: #f00; }
        .warn { color: #ff0; }
        .info { color: #0ff; }
        h1 { color: #fff; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
        pre { background: #333; padding: 10px; border-radius: 5px; overflow-x: auto; }
        #log { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>FichaFácil - Debug Console</h1>
    
    <div>
        <button onclick="testAll()">Ejecutar Todas las Pruebas</button>
        <button onclick="clearSW()">Limpiar Service Worker + Cache</button>
        <button onclick="location.reload(true)">Hard Reload</button>
    </div>
    
    <pre id="log"></pre>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
            log.scrollTop = log.scrollHeight;
        }
        
        async function testAll() {
            log.innerHTML = '';
            addLog('=== INICIANDO DIAGNÓSTICO ===', 'info');
            
            // Test 1: Service Worker status
            addLog('');
            addLog('1. SERVICE WORKER STATUS:', 'info');
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                addLog(`   Registrations: ${regs.length}`, regs.length > 0 ? 'ok' : 'warn');
                for (const reg of regs) {
                    addLog(`   - Scope: ${reg.scope}`, 'info');
                    addLog(`   - Active: ${reg.active ? 'YES' : 'NO'}`, 'info');
                }
            } else {
                addLog('   No soportado', 'warn');
            }
            
            // Test 2: Cache API status
            addLog('');
            addLog('2. CACHE STATUS:', 'info');
            if ('caches' in window) {
                const names = await caches.keys();
                addLog(`   Caches: ${names.length}`, 'ok');
                for (const name of names) {
                    const cache = await caches.open(name);
                    const keys = await cache.keys();
                    addLog(`   - ${name}: ${keys.length} items`, 'info');
                }
            }
            
            // Test 3: Scripts loaded
            addLog('');
            addLog('3. SCRIPTS GLOBALES:', 'info');
            addLog(`   window.FichaFacilAPI: ${typeof window.FichaFacilAPI !== 'undefined' ? 'OK ✓' : 'NO CARGADO ✗'}`, 
                   typeof window.FichaFacilAPI !== 'undefined' ? 'ok' : 'error');
            addLog(`   window.FichaFacilUtils: ${typeof window.FichaFacilUtils !== 'undefined' ? 'OK ✓' : 'NO CARGADO ✗'}`,
                   typeof window.FichaFacilUtils !== 'undefined' ? 'ok' : 'error');
            
            // Test 4: Backend connectivity
            addLog('');
            addLog('4. CONECTIVIDAD BACKEND:', 'info');
            try {
                const healthRes = await fetch('http://127.0.0.1:8000/health');
                const healthData = await healthRes.json();
                addLog(`   /health: ${healthData.status} (v${healthData.version})`, 'ok');
            } catch (e) {
                addLog(`   /health: ERROR - ${e.message}`, 'error');
                addLog('   ⚠️  ¿Está corriendo uvicorn?', 'warn');
            }
            
            // Test 5: CORS test
            addLog('');
            addLog('5. TEST CORS (fetch desde este origen):', 'info');
            try {
                const corsRes = await fetch('http://127.0.0.1:8000/health', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors'
                });
                addLog(`   CORS OK ✓ (status: ${corsRes.status})`, 'ok');
            } catch (e) {
                addLog(`   CORS ERROR ✗ - ${e.message}`, 'error');
                addLog('   ⚠️  Revisar configuración CORS en backend', 'warn');
            }
            
            // Test 6: Test API endpoints
            addLog('');
            addLog('6. TEST API ENDPOINTS:', 'info');
            
            // Test register (dry run - should fail validation but show CORS works)
            try {
                const regRes = await fetch('http://127.0.0.1:8000/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}),
                });
                const regData = await regRes.json();
                addLog(`   POST /auth/register: ${regRes.status} (${regRes.status === 422 ? 'Validation error esperado ✓' : 'OK'})`, 
                       regRes.status === 422 || regRes.status === 201 ? 'ok' : 'warn');
            } catch (e) {
                addLog(`   POST /auth/register: CORS/Network ERROR - ${e.message}`, 'error');
            }
            
            // Test negocios search
            try {
                const searchRes = await fetch('http://127.0.0.1:8000/negocios/search?q=bar');
                const searchData = await searchRes.json();
                addLog(`   GET /negocios/search: ${searchRes.status} (${searchData.length} resultados)`, 'ok');
            } catch (e) {
                addLog(`   GET /negocios/search: ERROR - ${e.message}`, 'error');
            }
            
            // Test 7: LocalStorage
            addLog('');
            addLog('7. LOCALSTORAGE:', 'info');
            const token = localStorage.getItem('token');
            addLog(`   Token guardado: ${token ? 'SÍ (' + token.substring(0, 20) + '...)' : 'NO'}`, token ? 'ok' : 'info');
            
            // Test 8: Load scripts manually if not loaded
            addLog('');
            addLog('8. INTENTANDO CARGAR SCRIPTS:', 'info');
            
            if (typeof window.FichaFacilUtils === 'undefined') {
                try {
                    await loadScript('/js/utils.js');
                    addLog(`   utils.js cargado: ${typeof window.FichaFacilUtils !== 'undefined' ? 'OK ✓' : 'FAILED ✗'}`,
                           typeof window.FichaFacilUtils !== 'undefined' ? 'ok' : 'error');
                } catch (e) {
                    addLog(`   utils.js: ERROR - ${e.message}`, 'error');
                }
            } else {
                addLog('   utils.js: Ya cargado ✓', 'ok');
            }
            
            if (typeof window.FichaFacilAPI === 'undefined') {
                try {
                    await loadScript('/js/api.js');
                    addLog(`   api.js cargado: ${typeof window.FichaFacilAPI !== 'undefined' ? 'OK ✓' : 'FAILED ✗'}`,
                           typeof window.FichaFacilAPI !== 'undefined' ? 'ok' : 'error');
                } catch (e) {
                    addLog(`   api.js: ERROR - ${e.message}`, 'error');
                }
            } else {
                addLog('   api.js: Ya cargado ✓', 'ok');
            }
            
            addLog('');
            addLog('=== DIAGNÓSTICO COMPLETO ===', 'info');
            addLog('');
            addLog('Si ves errores CORS o scripts NO CARGADOS:', 'warn');
            addLog('1. Haz clic en "Limpiar Service Worker + Cache"', 'warn');
            addLog('2. Haz clic en "Hard Reload"', 'warn');
            addLog('3. Luego ve a dashboard.html', 'warn');
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        async function clearSW() {
            addLog('');
            addLog('LIMPIANDO SERVICE WORKERS Y CACHES...', 'warn');
            
            // Unregister all service workers
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) {
                    await reg.unregister();
                    addLog(`   SW desregistrado: ${reg.scope}`, 'ok');
                }
            }
            
            // Clear all caches
            if ('caches' in window) {
                const names = await caches.keys();
                for (const name of names) {
                    await caches.delete(name);
                    addLog(`   Cache eliminado: ${name}`, 'ok');
                }
            }
            
            // Clear localStorage token (keep other data)
            // localStorage.removeItem('token');
            
            addLog('');
            addLog('✓ LIMPIEZA COMPLETA', 'ok');
            addLog('Ahora haz clic en "Hard Reload" y luego ve a dashboard.html', 'info');
        }
        
        // Auto-run on load
        window.onload = () => {
            addLog('Página cargada. Haz clic en "Ejecutar Todas las Pruebas"', 'info');
        };
    </script>
</body>
</html>
