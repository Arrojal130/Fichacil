# Render.com Blueprint
# Deploy backend as web service with SQLite persistent disk

services:
  - type: web
    name: fichafacil-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://fichafacil.netlify.app
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/fichafacil.db
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1

# Starter plan avoids free-tier cold starts during demos and client pilots.
# For production with real data, use managed PostgreSQL plus the backup/restore runbook.
