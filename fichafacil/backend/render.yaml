# Render.com Blueprint
# Hito 1 MVP: FastAPI backend + managed PostgreSQL, ready to deploy when credentials are available.

services:
  - type: web
    name: fichafacil-api
    runtime: python
    plan: starter
    rootDir: fichafacil/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fichafacil-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://fichafacil.netlify.app
      - key: TRUSTED_PROXY_IPS
        value: ""

# Managed PostgreSQL is the MVP production baseline. Do not deploy real client data on SQLite.
databases:
  - name: fichafacil-postgres
    plan: starter
    databaseName: fichafacil
    user: fichafacil

# Before deploying, replace CORS_ORIGINS with the final Netlify/custom frontend URL.
# Starter plan avoids free-tier cold starts during demos and client pilots.
